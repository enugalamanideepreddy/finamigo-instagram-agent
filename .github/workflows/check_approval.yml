name: Check Approval & Post

on:
  schedule:
    - cron: '*/30 5-9 * * *'   # Every 30 min, 10:30 AM–3:00 PM IST
  workflow_dispatch:             # Manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore agent state
        run: |
          curl -s -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts?name=agent-state&per_page=1" \
            | python3 -c "
          import sys, json, urllib.request
          data = json.load(sys.stdin)
          arts = data.get('artifacts', [])
          if not arts:
              print('No agent-state artifact yet.')
              sys.exit(0)
          aid = arts[0]['id']
          req = urllib.request.Request(
              f'https://api.github.com/repos/${{ github.repository }}/actions/artifacts/{aid}/zip',
              headers={'Authorization': 'Bearer ${{ secrets.GITHUB_TOKEN }}', 'Accept': 'application/vnd.github+json'}
          )
          with urllib.request.urlopen(req) as resp:
              open('/tmp/state.zip', 'wb').write(resp.read())
          " || true
          [ -f /tmp/state.zip ] && unzip -o /tmp/state.zip -d . || true

      - name: Check Telegram for approval and act
        run: python agent.py --check
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          AGENT_EMAIL: ${{ secrets.AGENT_EMAIL }}
          AGENT_EMAIL_PASSWORD: ${{ secrets.AGENT_EMAIL_PASSWORD }}
          APPROVAL_EMAIL: ${{ secrets.APPROVAL_EMAIL }}
          GOOGLE_FORM_URL: ${{ secrets.GOOGLE_FORM_URL }}
          GOOGLE_FORM_PREFILL_PARAM: ${{ secrets.GOOGLE_FORM_PREFILL_PARAM }}
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
          FEATURES_URL: https://raw.githubusercontent.com/enugalamanideepreddy/FinAmigo/main/FEATURES.md
          GH_PAT: ${{ secrets.GH_PAT }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Save updated agent state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-state
          path: agent_state.json
          retention-days: 90
          overwrite: true
          if-no-files-found: ignore

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'EOF'
          import os, requests
          token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          chat  = os.environ.get("TELEGRAM_CHAT_ID", "")
          if token and chat:
              requests.post(f"https://api.telegram.org/bot{token}/sendMessage", json={
                  "chat_id": chat,
                  "text": "❌ *Check/Post workflow failed!* Check GitHub Actions for details.",
                  "parse_mode": "Markdown",
              }, timeout=10)
          EOF
