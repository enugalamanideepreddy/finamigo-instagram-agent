name: Generate Post Draft

on:
  workflow_dispatch:
    inputs:
      image_style:
        description: 'Image tone (e.g. neon_cyberpunk, phone_hero_dark, auto)'
        required: false
        default: 'auto'
      caption_style:
        description: 'Caption style (e.g. bold_statement, story_moment, auto)'
        required: false
        default: 'auto'
      context:
        description: 'Optional context for the post'
        required: false
        default: ''
      gist_id:
        description: 'Existing Gist ID to revise (leave empty for new post)'
        required: false
        default: ''
      remarks:
        description: 'Revision notes (used with gist_id)'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore agent state
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          for workflow in generate.yml post.yml; do
            run_ids=$(gh run list --repo ${{ github.repository }} \
              --workflow "$workflow" --limit 5 --json databaseId \
              | python3 -c "import sys,json; [print(r['databaseId']) for r in json.load(sys.stdin)]" 2>/dev/null || true)
            for run_id in $run_ids; do
              if gh run download "$run_id" --repo ${{ github.repository }} \
                --name agent-state --dir . 2>/dev/null; then
                echo "Restored from $workflow run $run_id"
                break 2
              fi
            done
          done || true

      - name: Generate draft
        run: python agent.py --generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          AGENT_EMAIL: ${{ secrets.AGENT_EMAIL }}
          AGENT_EMAIL_PASSWORD: ${{ secrets.AGENT_EMAIL_PASSWORD }}
          APPROVAL_EMAIL: ${{ secrets.APPROVAL_EMAIL }}
          FEATURES_URL: https://raw.githubusercontent.com/enugalamanideepreddy/FinAmigo/main/FEATURES.md
          GH_PAT: ${{ secrets.GH_PAT }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BOT_SERVER_URL: ${{ secrets.BOT_SERVER_URL }}
          BOT_API_SECRET: ${{ secrets.BOT_API_SECRET }}
          IMAGE_STYLE_OVERRIDE: ${{ inputs.image_style }}
          CAPTION_STYLE_OVERRIDE: ${{ inputs.caption_style }}
          CONTEXT_OVERRIDE: ${{ inputs.context }}
          GIST_ID_OVERRIDE: ${{ inputs.gist_id }}
          REMARKS_OVERRIDE: ${{ inputs.remarks }}

      - name: Save agent state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-state
          path: agent_state.json
          retention-days: 90
          overwrite: true
          if-no-files-found: ignore

      - name: Notify on failure
        if: failure()
        run: |
          python3 - <<'EOF'
          import os, requests
          token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          chat  = os.environ.get("TELEGRAM_CHAT_ID", "")
          if token and chat:
              requests.post(f"https://api.telegram.org/bot{token}/sendMessage", json={
                  "chat_id": chat,
                  "text": "❌ Generate workflow failed! Check GitHub Actions for details.",
              }, timeout=10)
          EOF
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
