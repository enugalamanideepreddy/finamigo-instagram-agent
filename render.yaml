services:
  - type: web
    name: finamigo-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn bot_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GH_PAT
        sync: false
      - key: GH_REPO
        sync: false
      - key: BOT_API_SECRET
        sync: false
