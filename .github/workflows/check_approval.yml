name: Check Approval & Post

on:
  schedule:
    - cron: '*/10 5-10 * * *'  # Every 10 min, 10:30 AM–4:00 PM IST
  workflow_dispatch:             # Manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore agent state
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Look in both generate and check_approval recent runs for the latest agent-state
          for workflow in generate.yml check_approval.yml; do
            run_ids=$(gh run list --repo ${{ github.repository }} \
              --workflow "$workflow" --limit 5 --json databaseId \
              | python3 -c "import sys,json; [print(r['databaseId']) for r in json.load(sys.stdin)]" 2>/dev/null || true)
            for run_id in $run_ids; do
              if gh run download "$run_id" \
                --repo ${{ github.repository }} \
                --name agent-state --dir . 2>/dev/null; then
                echo "Restored agent-state from $workflow run $run_id"
                cat agent_state.json | python3 -c "import sys,json; s=json.load(sys.stdin); print(f'gist_id={s.get(\"current_gist_id\")}, offset={s.get(\"telegram_offset\")}')" 2>/dev/null || true
                exit 0
              fi
            done
          done
          echo "No agent-state found — starting fresh."

      - name: Check Telegram for approval and act
        run: python agent.py --check
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          AGENT_EMAIL: ${{ secrets.AGENT_EMAIL }}
          AGENT_EMAIL_PASSWORD: ${{ secrets.AGENT_EMAIL_PASSWORD }}
          APPROVAL_EMAIL: ${{ secrets.APPROVAL_EMAIL }}
          GOOGLE_FORM_URL: ${{ secrets.GOOGLE_FORM_URL }}
          GOOGLE_FORM_PREFILL_PARAM: ${{ secrets.GOOGLE_FORM_PREFILL_PARAM }}
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
          FEATURES_URL: https://raw.githubusercontent.com/enugalamanideepreddy/FinAmigo/main/FEATURES.md
          GH_PAT: ${{ secrets.GH_PAT }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Save updated agent state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-state
          path: agent_state.json
          retention-days: 90
          overwrite: true
          if-no-files-found: ignore

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'EOF'
          import os, requests
          token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          chat  = os.environ.get("TELEGRAM_CHAT_ID", "")
          if token and chat:
              requests.post(f"https://api.telegram.org/bot{token}/sendMessage", json={
                  "chat_id": chat,
                  "text": "❌ *Check/Post workflow failed!* Check GitHub Actions for details.",
                  "parse_mode": "Markdown",
              }, timeout=10)
          EOF
