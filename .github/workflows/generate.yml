name: Generate Twice-Weekly Post Draft

on:
  schedule:
    - cron: '30 4 * * 3,6'  # 10:00 AM IST — Wednesday & Saturday
  workflow_dispatch:          # Manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore agent state
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh run list --repo ${{ github.repository }} --workflow generate.yml \
            --status success --limit 5 --json databaseId \
            | python3 -c "
          import sys, json
          runs = json.load(sys.stdin)
          if not runs: sys.exit(0)
          for r in runs:
              print(r['databaseId'])
          " | while read run_id; do
            if gh run download "$run_id" \
              --repo ${{ github.repository }} \
              --name agent-state --dir . 2>/dev/null; then
              echo "Restored agent-state from run $run_id"
              break
            fi
          done || true

      - name: Generate draft and send for approval
        run: python agent.py --generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          AGENT_EMAIL: ${{ secrets.AGENT_EMAIL }}
          AGENT_EMAIL_PASSWORD: ${{ secrets.AGENT_EMAIL_PASSWORD }}
          APPROVAL_EMAIL: ${{ secrets.APPROVAL_EMAIL }}
          GOOGLE_FORM_URL: ${{ secrets.GOOGLE_FORM_URL }}
          GOOGLE_FORM_PREFILL_PARAM: ${{ secrets.GOOGLE_FORM_PREFILL_PARAM }}
          FEATURES_URL: https://raw.githubusercontent.com/enugalamanideepreddy/FinAmigo/main/FEATURES.md
          GH_PAT: ${{ secrets.GH_PAT }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Save agent state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-state
          path: agent_state.json
          retention-days: 90
          overwrite: true
          if-no-files-found: ignore

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<'EOF'
          import os, requests
          token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          chat  = os.environ.get("TELEGRAM_CHAT_ID", "")
          if token and chat:
              requests.post(f"https://api.telegram.org/bot{token}/sendMessage", json={
                  "chat_id": chat,
                  "text": "❌ Generate workflow failed! Check GitHub Actions for details.",
              }, timeout=10)
          EOF
