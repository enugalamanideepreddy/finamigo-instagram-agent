name: Check Approval & Post

on:
  schedule:
    - cron: '*/30 5-9 * * *'   # Every 30 min, 10:30 AM–3:00 PM IST only
  workflow_dispatch:             # Manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download latest draft artifact
        id: download
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          ARTIFACT_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts" \
            --jq '[.artifacts[] | select(.name | startswith("draft-")) | select(.expired == false)] | sort_by(.created_at) | last | .id')

          if [ -z "$ARTIFACT_ID" ] || [ "$ARTIFACT_ID" = "null" ]; then
            echo "No pending draft artifact found."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh api "repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip" > draft.zip
          unzip -o draft.zip
          rm draft.zip
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "Draft artifact $ARTIFACT_ID downloaded."

      - name: Skip if no draft pending
        if: steps.download.outputs.found != 'true'
        run: |
          echo "No pending draft. Nothing to do today."
          exit 0

      - name: Check approval and act
        run: python agent.py --check
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          AGENT_EMAIL: ${{ secrets.AGENT_EMAIL }}
          AGENT_EMAIL_PASSWORD: ${{ secrets.AGENT_EMAIL_PASSWORD }}
          APPROVAL_EMAIL: ${{ secrets.APPROVAL_EMAIL }}
          GOOGLE_FORM_URL: ${{ secrets.GOOGLE_FORM_URL }}
          GOOGLE_FORM_PREFILL_PARAM: ${{ secrets.GOOGLE_FORM_PREFILL_PARAM }}
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
          FEATURES_URL: https://raw.githubusercontent.com/enugalamanideepreddy/FinAmigo/main/FEATURES.md
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Upload updated draft (if regenerated)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: draft-${{ github.run_id }}
          path: draft.json
          retention-days: 2
          if-no-files-found: ignore
