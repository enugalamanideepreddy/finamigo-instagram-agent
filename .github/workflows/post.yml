name: Post to Instagram

on:
  workflow_dispatch:
    inputs:
      gist_id:
        description: 'Gist ID containing the approved draft'
        required: true

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore agent state
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          for workflow in generate.yml post.yml; do
            run_ids=$(gh run list --repo ${{ github.repository }} \
              --workflow "$workflow" --limit 5 --json databaseId \
              | python3 -c "import sys,json; [print(r['databaseId']) for r in json.load(sys.stdin)]" 2>/dev/null || true)
            for run_id in $run_ids; do
              if gh run download "$run_id" --repo ${{ github.repository }} \
                --name agent-state --dir . 2>/dev/null; then
                echo "Restored from $workflow run $run_id"
                break 2
              fi
            done
          done || true

      - name: Post to Instagram
        run: python agent.py --post-gist
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BOT_SERVER_URL: ${{ secrets.BOT_SERVER_URL }}
          BOT_API_SECRET: ${{ secrets.BOT_API_SECRET }}
          FEATURES_URL: https://raw.githubusercontent.com/enugalamanideepreddy/FinAmigo/main/FEATURES.md
          GIST_ID_OVERRIDE: ${{ inputs.gist_id }}

      - name: Save agent state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-state
          path: agent_state.json
          retention-days: 90
          overwrite: true
          if-no-files-found: ignore

      - name: Notify on failure
        if: failure()
        run: |
          python3 - <<'EOF'
          import os, requests
          token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          chat  = os.environ.get("TELEGRAM_CHAT_ID", "")
          if token and chat:
              requests.post(f"https://api.telegram.org/bot{token}/sendMessage", json={
                  "chat_id": chat,
                  "text": "❌ Post workflow failed! Check GitHub Actions for details.",
              }, timeout=10)
          EOF
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
