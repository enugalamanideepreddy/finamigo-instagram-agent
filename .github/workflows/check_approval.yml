name: Check Approval & Post

on:
  schedule:
    - cron: '*/5 5-17 * * *'
  workflow_dispatch:         # Manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download latest draft artifact
        uses: actions/download-artifact@v4
        with:
          pattern: draft-*
          merge-multiple: true
        continue-on-error: true

      - name: Check approval and act
        run: |
          if [ -f draft.json ]; then
            python agent.py --check
          else
            echo "No pending draft found. Skipping."
          fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          AGENT_EMAIL: ${{ secrets.AGENT_EMAIL }}
          AGENT_EMAIL_PASSWORD: ${{ secrets.AGENT_EMAIL_PASSWORD }}
          APPROVAL_EMAIL: ${{ secrets.APPROVAL_EMAIL }}
          GOOGLE_FORM_URL: ${{ secrets.GOOGLE_FORM_URL }}
          GOOGLE_FORM_PREFILL_PARAM: ${{ secrets.GOOGLE_FORM_PREFILL_PARAM }}
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
          FEATURES_URL: https://raw.githubusercontent.com/enugalamanideepreddy/FinAmigo/main/FEATURES.md

      - name: Upload updated draft (if regenerated)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: draft-${{ github.run_id }}
          path: draft.json
          retention-days: 2
          if-no-files-found: ignore
